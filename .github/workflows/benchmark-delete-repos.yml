# Delete benchmark fork repos whose names match step 0 naming (__tool_slug__YYYYMMDD).
# Default: list only. Use action=delete to pass --execute (destructive).

name: Benchmark delete repos

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch or tag) of this repo to run scripts from"
        required: false
        default: "main"
      benchmark_org:
        description: "GitHub org containing benchmark fork repos"
        required: true
        type: string
      tool:
        description: "Tool name as step 0 --name (e.g. neatcode_staging)"
        required: true
        type: string
      date:
        description: "Optional YYYYMMDD — only delete repos ending with this date"
        required: false
        type: string
        default: ""
      action:
        description: "list = print matches only; delete = actually remove repos (irreversible)"
        required: false
        type: choice
        options:
          - list
          - delete
        default: list

concurrency:
  group: benchmark-delete-${{ github.repository }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: offline

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      GH_TOKEN: ${{ secrets.BENCHMARK_GH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.BENCHMARK_GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Verify GitHub token
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then echo "Missing secret BENCHMARK_GH_TOKEN"; exit 1; fi

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Delete matching repos (list or delete per action input)
        run: |
          set -euo pipefail
          ARGS=(--org "${{ inputs.benchmark_org }}" --tool "${{ inputs.tool }}")
          if [[ -n "${{ inputs.date }}" ]]; then ARGS+=(--date "${{ inputs.date }}"); fi
          # Use choice input (not boolean): GitHub booleans often stringify badly in bash and
          # never match "false", so --execute was never passed when unchecking the old checkbox.
          if [[ "${{ inputs.action }}" == "delete" ]]; then ARGS+=(--execute); fi
          uv run python -m code_review_benchmark.delete_benchmark_repos "${ARGS[@]}"
